<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 基础样式重置 */
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* 容器宽度控制 */
   .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 导航栏样式 */
   .nav-container {
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: #1a1a1a;
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

   .search-input {
      flex: 1;
      max-width: 180px;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      background-color: #2b2b2b;
      color: #fff;
    }

   .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 10px;
      transition: color 0.3s;
    }

   .nav-links a:hover {
      color: white;
    }

    /* 游戏详情样式 */
   .game-detail {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

   .game-title {
      text-align: left;
      font-size: 24px;
    }

   .game-sub-nav {
      display: flex;
      justify-content: flex-start;
      gap: 20px;
      margin-bottom: 10px;
    }

   .game-sub-nav a {
      color: #ccc;
      text-decoration: none;
      transition: color 0.3s;
    }

   .game-sub-nav a.active {
      color: white;
    }

   .game-sub-nav a:hover {
      color: white;
    }

   .game-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
    }

   .game-img {
      width: 40%;
      border-radius: 8px 0 0 8px;
    }

   .game-data {
      display: flex;
      flex-direction: column;
      text-align: center;
      gap: 5px;
      padding: 20px;
    }

   .game-data p {
      margin: 0;
      color: #ccc;
    }
     /* 成就系统样式 */
   .achievement-system {
      margin-bottom: 20px;
    }

   .achievement-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

   .achievement-title {
      font-size: 16px;
    }

   .sort-dropdown {
      position: relative;
      display: inline-block;
    }

   .sort-button {
      background-color: #1a1a1a;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

   .sort-button:hover {
      background-color: #222;
    }

   .sort-dropdown-content {
      display: none;
      position: absolute;
      background-color: #1a1a1a;
      min-width: 120px;
      box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

   .sort-dropdown-content a {
      color: white;
      padding: 8px 16px;
      text-decoration: none;
      display: block;
      transition: background-color 0.3s;
       font-size: 12px;
    }

   .sort-dropdown-content a:hover {
      background-color: #222;
    }

   .sort-dropdown:hover .sort-dropdown-content {
      display: block;
    }

   .achievement-item {
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #333;
      padding: 10px 0;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

   .achievement-icon {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

   .achievement-details {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

   .achievement-name {
      font-size: 12px;
      margin: 0;
    }

   .achievement-description {
      font-size: 10px;
      margin: 0;
    }

   .achievement-value {
      font-size: 10px;
      color: #aaa;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 顶部导航栏 -->
    <div class="container">
    <div class="nav-container">
      <input type="text" class="search-input" placeholder="搜索商城">
      <a href="#" class="nav-link">探索</a>
      <a href="#" class="nav-link">浏览</a>
      <a href="#" class="nav-link">新闻</a>
    </div>


    <!-- 游戏详情部分 -->
    <div class="game-detail">
      <h1 class="game-title">奥咕和秘密森林</h1>
      <div class="game-sub-nav">
        <a href="#" class="active">总览</a>
        <a href="#">成就系统</a>
      </div>
      <div class="game-info">
        <img class="game-img" src="https://cdn1.epicgames.com/spt-assets/ab32c6c664f340f0bb18afcb9b036dae/ogu-and-the-secret-forest-4tnoa.png" alt="奥咕和秘密森林">
        <div class="game-data">
          <p><span>
            派大星
          </span><br>我们一起去抓水母吧</p>

        </div>
      </div>


    </div>
    <!-- 排序部分 -->
    <!-- 成就系统 -->
    <div class="achievement-system">
      <div class="achievement-header">
        <span class="achievement-title">成就系统</span>
        <div class="sort-dropdown">
          <button class="sort-button" id="sortButton">按字母顺序 ▽</button>
          <div class="sort-dropdown-content" id="sortDropdown">
            <a href="#" data-sort="name-asc">按字母顺序</a>
            <a href="#" data-sort="rarity-desc">稀有度</a>
            <a href="#" data-sort="progress-desc">进度: 由高至低</a>
            <a href="#" data-sort="progress-asc">进度: 由低至高</a>
            <a href="#" data-sort="xp-desc">经验值: 由高至低</a>
            <a href="#" data-sort="xp-asc">经验值: 由低至高</a>
          </div>
        </div>
      </div>
      <div class="achievement-list" id="achievementList">
      </div>
    </div>
  </div>

  <script>
    // 成就数据
    const achievements = [
      {
        id: 1,
        name: "A Whole New World",
        description: "You've arrived at a new unknown world.",
        xp: 90,
        rarity: 77,
        icon: "https://shared-static-prod.epicgames.com/epic-achievements/ab32c6c664f340f0bb18afcb9b036dae/03b2f198c0ec447db7ceff375b4bfe6b/icons/15e18937bf5e7f1714935eb4582fe252"
      },
      {
        id: 2,
        name: "Adventure Begins!",
        description: "You've inserted the 'Sigil of the Sun' to the 'Heart of the World'.",
        xp: 80,
        rarity: 27,
        icon: "https://shared-static-prod.epicgames.com/epic-achievements/ab32c6c664f340f0bb18afcb9b036dae/03b2f198c0ec447db7ceff375b4bfe6b/icons/36d35b5143460366d55fffb17afb7e35"
      },
      {
        id: 3,
        name: "Arena Champion",
        description: "You've reached the maximum honor score in the arena.",
        xp: 70,
        rarity: 2,
        icon: "https://shared-static-prod.epicgames.com/epic-achievements/ab32c6c664f340f0bb18afcb9b036dae/03b2f198c0ec447db7ceff375b4bfe6b/icons/e5c85437564a919d7834f8b166a543e1"
      },
      {
        id: 4,
        name: "Bshes to Ashes",
        description: "Failed cooking for the first time.",
        xp: 60,
        rarity: 6,
        icon: "https://shared-static-prod.epicgames.com/epic-achievements/ab32c6c664f340f0bb18afcb9b036dae/03b2f198c0ec447db7ceff375b4bfe6b/icons/6aa0b3902c4b13fd3f9a09e7c2bc44c8"
      },
      {
        id: 5,
        name: "Cheers!",
        description: "You've inserted the 'Sigil of the Fire' to the 'Heart of the World'.",
        xp: 30,
        rarity: 3,
        icon: "https://shared-static-prod.epicgames.com/epic-achievements/ab32c6c664f340f0bb18afcb9b036dae/03b2f198c0ec447db7ceff375b4bfe6b/icons/a32b4922234912d370d2aafda964ef37"
      },
      {
        id: 6,
        name: "Darkness Be Gone",
        description: "You've inserted the 'Sigil of the Moon' to the 'Heart of the World'.",
        xp: 58,
        rarity: 7,
        icon: "https://shared-static-prod.epicgames.com/epic-achievements/ab32c6c664f340f0bb18afcb9b036dae/03b2f198c0ec447db7ceff375b4bfe6b/icons/af8838c98df59546c61bafdd4cc89713"
      }
    ];

    // 当前排序方式
    let currentSort = "name-asc";

    // 渲染成就列表
    function renderAchievements(sortedAchievements) {
      const listElement = document.getElementById('achievementList');
      listElement.innerHTML = '';

      sortedAchievements.forEach((achievement, index) => {
        const achievementElement = document.createElement('div');
        achievementElement.className = 'achievement-item';
        achievementElement.style.animationDelay = `${index * 0.05}s`;
        
        achievementElement.innerHTML = `
          <img class="achievement-icon" src="${achievement.icon}" alt="${achievement.name}">
          <div class="achievement-details">
            <span class="achievement-name">${achievement.name}</span>
            <span class="achievement-description">${achievement.description}</span>
            <span class="achievement-value">${achievement.xp}经验值 | ${achievement.rarity}%的玩家已解锁</span>
          </div>
        `;
        
        listElement.appendChild(achievementElement);
      });
    }

    // 排序函数
    function sortAchievements(sortType) {
      const sorted = [...achievements].sort((a, b) => {
        switch(sortType) {
          case "name-asc":
            return a.name.localeCompare(b.name);
          case "name-desc":
            return b.name.localeCompare(a.name);
          case "rarity-desc":
            return a.rarity - b.rarity;
          case "rarity-asc":
            return a.rarity - b.rarity;
          case "progress-desc":
            return a.rarity - b.rarity; // 稀有度低 = 进度高
          case "progress-asc":
            return b.rarity - a.rarity; // 稀有度高 = 进度低
          case "xp-desc":
            return b.xp - a.xp;
          case "xp-asc":
            return a.xp - b.xp;
          default:
            return a.name.localeCompare(b.name);
        }
      });
      
      // 更新按钮文本
      const sortButton = document.getElementById('sortButton');
      const sortText = {
        "name-asc": "按字母顺序 ▽",
        "rarity-desc": "按稀有度 ▽",
        "progress-desc": "进度: 由高至低 ▽",
        "progress-asc": "进度: 由低至高 ▽",
        "xp-desc": "经验值: 由高至低 ▽",
        "xp-asc": "经验值: 由低至高 ▽"
      };
      
      sortButton.textContent = sortText[sortType] || "按字母顺序 ▽";
      currentSort = sortType;
      
      // 渲染排序后的列表
      renderAchievements(sorted);
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 初始渲染
      sortAchievements(currentSort);
      
      // 绑定排序选项点击事件
      const sortOptions = document.querySelectorAll('#sortDropdown a');
      sortOptions.forEach(option => {
        option.addEventListener('click', (e) => {
          e.preventDefault();
          const sortType = option.getAttribute('data-sort');
          sortAchievements(sortType);
          
          // 关闭下拉菜单
          document.getElementById('sortDropdown').style.display = 'none';
        });
      });
      
      // 点击按钮切换下拉菜单显示状态
      document.getElementById('sortButton').addEventListener('click', (e) => {
        e.stopPropagation();
        const dropdown = document.getElementById('sortDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      });
      
      // 点击其他地方关闭下拉菜单
      document.addEventListener('click', () => {
        document.getElementById('sortDropdown').style.display = 'none';
      });
    });
  </script>
</body>

</html>
