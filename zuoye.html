<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 基础样式重置 */
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* 容器宽度控制 */
   .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 导航栏样式 */
   .nav-container {
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: #1a1a1a;
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

   .search-input {
      flex: 1;
      max-width: 180px;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      background-color: #2b2b2b;
      color: #fff;
    }

   .nav-link {
      color: #ccc;
      text-decoration: none;
      transition: color 0.3s;
    }

   .nav-link:hover {
      color: #fff;
    }

   .search-image3 {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

   .search-image3_1 {
      flex: 1;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #d31616;
      color: white;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s;
    }

   .search-image3_1:hover {
      transform: translateY(-5px);
    }

    /* 大图小图区域样式 */
   .content-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

   .big_image {
      flex: 3;
      background-color: #1a1a1a;
      padding: 30px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

   .big_image h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

   .big_image p {
      margin-bottom: 15px;
      line-height: 1.5;
    }

   .youhui_button {
      width: fit-content;
      padding: 10px 20px;
      background-color: #d31616;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

   .youhui_button:hover {
      background-color: #e32626;
    }

   .price-info {
      margin-top: 20px;
      font-size: 18px;
    }

   .price-info del {
      color: #aaa;
      margin-right: 10px;
    }

   .six_small_game_image {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

   .six_small_game_image div {
      background-color: #2b2b2b;
      height: 80px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 10px;
      transition: background-color 0.3s;
    }

   .six_small_game_image div:hover {
      background-color: #3b3b3b;
    }

    /* 游戏推荐样式 */
   .game-recommendation {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

   .game-recommendation-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

   .game-recommendation-title {
      font-size: 14px;
    }

   .game-recommendation-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-width: none;
    }

   .game-card {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: #1a1a1a;
      border-radius: 8px;
      width: 200px;
    }

   .game-card img {
      width: 100%;
      border-radius: 8px 8px 0 0;
    }

   .game-card p {
      margin: 0 15px 10px;
      font-size: 14px;
    }

   .fortnite-promotion {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

   .fortnite-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background-color: #1a1a1a;
      border-radius: 8px;
      padding: 10px;
    }

   .fortnite-item img {
      width: 100%;
      border-radius: 8px;
    }

   .fortnite-item p {
      margin: 0;
      font-size: 14px;
    }

   .fortnite-item button {
      padding: 6px 12px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

   .fortnite-item button:hover {
      background-color: #444;
    }
  </style>
</head>
